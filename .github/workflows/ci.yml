name: FarmLink AI CI/CD Build pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/postgres' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'mock-nextauth-secret-key-hash-string-value-for-ci' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'mock-gemini-api-key-value-for-ci' }}
      NEXT_PUBLIC_APP_URL: "https://farmlink-umber.vercel.app"
      NEXT_PUBLIC_SOCKET_URL: "http://localhost:3001"

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Auto-Patch Missing Database Models
      run: node scripts/prisma-mock-check.js

    - name: Compile Prisma Client Typings
      run: npx prisma generate

    - name: Run Eslint Verification
      run: npm run lint

    - name: Run TypeScript Type Check
      run: npm run typecheck

    - name: Verify TypeScript & Build Next.js Production Bundle
      run: npm run build

    - name: Run Tests
      run: npm test
